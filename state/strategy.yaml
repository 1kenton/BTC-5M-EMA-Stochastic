version: "01"
strategy_name: "EMA + RSI + Stochastic Oscillator"

# Tunable parameters (Hermes changes ONE per reflection cycle)
entry:
  ema_short: 25          # fast EMA period
  ema_medium: 75         # mid EMA period (RSI matches this)
  ema_long: 140          # slow EMA period (final trend barrier)
  rsi_period: 75         # RSI period — synced to ema_medium
  stoch_k: 14            # stochastic %K period
  stoch_d: 3             # stochastic %D smoothing
  stoch_ob: 80.0         # overbought threshold
  stoch_os: 20.0         # oversold threshold
  rr_ratio: 2.5          # risk-to-reward multiplier for target
  slope_lookback: 3      # bars used to measure EMA slope direction
  sl_buffer_pct: 0.002   # stop-loss buffer fraction beyond the EMA
